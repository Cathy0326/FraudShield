server {
    listen 80;
    server_name _;

    # React前端静态文件
    # Serve React static files; fallback to index.html for client-side routing
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        # 所有路径回退到index.html，让React Router处理
        # All paths fall back to index.html so React Router handles navigation
        try_files $uri $uri/ /index.html;
    }

    # API反向代理 → Spring Boot backend
    # Proxy /api, /auth, /test, /health to the backend container
    location /api {
        proxy_pass         http://backend:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    location /auth {
        proxy_pass         http://backend:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
    }

    location /test {
        proxy_pass         http://backend:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
    }

    location /health {
        proxy_pass         http://backend:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
    }
}
