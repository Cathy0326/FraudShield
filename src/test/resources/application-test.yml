# Overrides applied when @ActiveProfiles("test") is set.
# Keeps tests hermetic — no live Kafka or Redis required.
spring:
  kafka:
    bootstrap-servers: localhost:9092   # points nowhere; Kafka beans still initialize lazily
  data:
    redis:
      host: localhost
      port: 6379

# Tell KafkaAdmin not to fail fast when the broker is unreachable during tests
spring.kafka.admin.fail-fast: false
