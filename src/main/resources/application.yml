# ── Server ──────────────────────────────────────────────────────────────────
server:
  port: 8080

spring:
  # ── H2 In-Memory Database ─────────────────────────────────────────────────
  # Swap the url/driver/dialect lines for PostgreSQL when ready.
  datasource:
    url: jdbc:h2:mem:fraudshield;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  # H2 web console — useful during development (disable in prod)
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true   # allow access from non-localhost (Docker/remote)

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update   # auto-creates tables from @Entity classes
    show-sql: false       # flip to true for query logging

  # ── Redis ──────────────────────────────────────────────────────────────────
  # Used for sliding-window counters and short-lived risk state.
  data:
    redis:
      host: localhost
      port: 6379
      password: ""   # override via SPRING_DATA_REDIS_PASSWORD env var
      ssl:
        enabled: false   # Azure Cache for Redis requires SSL — override via SPRING_DATA_REDIS_SSL_ENABLED
      connect-timeout: 2000   # ms — don't block startup too long

  # ── Kafka ──────────────────────────────────────────────────────────────────
  # fail-fast=false lets the app start even when the broker is not yet reachable
  # Local dev / docker-compose: plaintext localhost:9092 (defaults below).
  # Production: point at an Azure Event Hubs Kafka-compatible endpoint via env vars —
  # see KAFKA_* below. Event Hubs requires SASL_SSL with the connection string as password.
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    admin:
      fail-fast: false
    properties:
      security.protocol: ${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
      sasl.mechanism: ${KAFKA_SASL_MECHANISM:PLAIN}
      sasl.jaas.config: ${KAFKA_SASL_JAAS_CONFIG:}
    # Producer defaults
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    # Consumer defaults
    consumer:
      group-id: fraudshield-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.fraudshield.*"

# ── JWT ──────────────────────────────────────────────────────────────────────
# secret必须保密；这里是base64编码的字符串，对应 "fraudshield-secret-key-2026-hackathon"
# Keep the secret out of VCS in production — use env var or vault instead
jwt:
  secret: "ZnJhdWRzaGllbGQtc2VjcmV0LWtleS0yMDI2LWhhY2thdGhvbg=="
  expiration-ms: 86400000   # 24 hours in milliseconds

# ── App-level custom properties ───────────────────────────────────────────────
fraudshield:
  kafka:
    topic:
      order-events: order-events   # topic name used by producers/consumers

# ── Azure OpenAI ──────────────────────────────────────────────────────────────
# 凭证通过环境变量或.env文件注入（不提交到git）
# Credentials are injected via env vars / .env file — never committed to VCS
azure:
  openai:
    endpoint: ${AZURE_OPENAI_ENDPOINT:}
    key: ${AZURE_OPENAI_KEY:}
    deployment: ${AZURE_OPENAI_DEPLOYMENT:gpt-4.1-mini}

# ai.enabled=false 时跳过所有LLM调用（本地开发无需配置密钥）
# Set ai.enabled=false to skip all LLM calls (useful for local dev without credentials)
ai:
  enabled: true
