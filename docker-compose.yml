# ── Networks ────────────────────────────────────────────────────────────────
networks:
  fraudshield-net:
    driver: bridge

services:

  # ── Zookeeper ────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: zookeeper
    networks: [fraudshield-net]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      # cub (Confluent Utility Belt) is bundled in all cp-* images and is the
      # canonical way to wait for ZooKeeper — much more reliable than nc/shell tricks
      test: ["CMD", "cub", "zk-ready", "localhost:2181", "30"]
      interval: 10s
      timeout: 35s
      retries: 10
      start_period: 20s

  # ── Kafka ─────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    networks: [fraudshield-net]
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"   # host-accessible; app connects via localhost:9092
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # PLAINTEXT_HOST listener is exposed to the Docker host (your app)
      # PLAINTEXT listener is internal container-to-container traffic
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      # cub kafka-ready waits until N brokers are available — same utility, same reliability
      test: ["CMD", "cub", "kafka-ready", "1", "30", "-b", "localhost:29092"]
      interval: 15s
      timeout: 35s
      retries: 15
      start_period: 30s

  # ── Redis 7 ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: redis
    networks: [fraudshield-net]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
