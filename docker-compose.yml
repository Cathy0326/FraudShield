# FraudShield — full stack docker-compose
# Startup order: zookeeper → kafka → redis → backend → frontend

networks:
  fraudshield-net:
    driver: bridge

volumes:
  redis-data:
  prometheus-data:
  grafana-data:

services:

  # ── Zookeeper ──────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: fraudshield-zookeeper
    networks: [fraudshield-net]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      # cub (Confluent Utility Belt) is bundled in all cp-* images — most reliable check
      test: ["CMD", "cub", "zk-ready", "localhost:2181", "30"]
      interval: 10s
      timeout: 35s
      retries: 10
      start_period: 20s

  # ── Kafka ──────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: fraudshield-kafka
    networks: [fraudshield-net]
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"   # external (host → Kafka)
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # 29092: internal container-to-container traffic
      # 9092:  external host access (your app / IntelliJ)
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Redis 7 ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: fraudshield-redis
    networks: [fraudshield-net]
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes   # persist data across restarts
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Spring Boot Backend ────────────────────────────────────────────────────
  # Backend lives in the project root (no fraudshield-backend subdirectory)
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fraudshield-backend
    networks: [fraudshield-net]
    ports:
      - "8080:8080"
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # 容器间通信用服务名而不是localhost
      # Container networking: use service name, not localhost
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      JWT_SECRET: ZnJhdWRzaGllbGQtc2VjcmV0LWtleS0yMDI2LWhhY2thdGhvbg==
      # Azure OpenAI credentials — sourced from .env file (never commit .env)
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      AZURE_OPENAI_KEY: ${AZURE_OPENAI_KEY:-}
      AZURE_OPENAI_DEPLOYMENT: ${AZURE_OPENAI_DEPLOYMENT:-gpt-4.1-mini}
      # PII落库加密密钥 —— compose默认值仅供本地demo；真实部署必须用自己的密钥覆盖
      # （openssl rand -base64 32）并通过secret管理注入，绝不能写进compose文件
      # PII-at-rest encryption key. The default is for local demo ONLY — real
      # deployments must override with their own key (openssl rand -base64 32)
      # injected from a secret store, never a compose file.
      FRAUDSHIELD_ENCRYPTION_KEY: ${FRAUDSHIELD_ENCRYPTION_KEY:-HSQyfTqIYzNQXyr9E9FWp7T9PjS5dmW7f3mtYsy77qI=}
      # 本地demo默认开启持续订单模拟器；不想要合成流量时改为false
      # Continuous order simulator on by default for local demos; set false to disable
      SIMULATOR_ENABLED: ${SIMULATOR_ENABLED:-true}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # ── React Frontend (nginx) ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./fraudshield-frontend
      dockerfile: Dockerfile
    container_name: fraudshield-frontend
    environment:
      BACKEND_HOST: backend:8080
    networks: [fraudshield-net]
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

  # ── Prometheus ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: fraudshield-prometheus
    networks: [fraudshield-net]
    ports:
      - "9090:9090"
    # 显式command：加了TSDB持久化路径和保留期后必须重申config.file，否则会覆盖镜像默认启动参数
    # Explicit command: once we set the TSDB path/retention we must restate config.file,
    # otherwise these flags replace the image's default args entirely
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'   # keep 30 days of metrics history
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      # 关键修复：TSDB落到命名卷 —— 否则Prometheus重启即丢全部历史，Grafana只剩"当天"数据
      # The fix: persist the TSDB to a named volume. Without this, a Prometheus restart
      # wipes all history and Grafana shows only "today" (data since the container started).
      - prometheus-data:/prometheus
    depends_on:
      backend:
        condition: service_healthy

  # ── Grafana ────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.2.0
    container_name: fraudshield-grafana
    networks: [fraudshield-net]
    ports:
      - "3001:3000"   # host 3001 — frontend already owns host 3000
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin   # change after first login; dev/demo only
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      # Mounted outside /etc/grafana/provisioning rather than nested inside it —
      # Docker can't create a nested mountpoint inside an already read-only bind mount.
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      # Grafana自身状态(用户/星标/注解等)持久化到命名卷 / persist Grafana's own state
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
